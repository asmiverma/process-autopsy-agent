<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Test</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background: #1a1a1a; color: white; padding: 20px; font-family: Arial;">
    <h2>React Test - Checking App Initialization</h2>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;
        
        function TestApp() {
            const [counter, setCounter] = useState(0);
            
            return (
                <div style={{padding: '20px', background: '#2a2a2a', borderRadius: '8px'}}>
                    <h3>React is working!</h3>
                    <p>Counter: {counter}</p>
                    <button 
                        onClick={() => setCounter(counter + 1)}
                        style={{padding: '10px 20px', background: '#0066cc', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer'}}
                    >
                        Click me
                    </button>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<TestApp />);
    </script>
</body>
</html>
